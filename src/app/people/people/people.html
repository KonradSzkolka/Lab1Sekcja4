<table>
    <thread>    
        <tr>    
            <th>Id</th>
            <th>Name</th>
            <th>Surname</th>
            <th>Date of Birth</th>
            <th>Wiek</th>
            <th>Przejdz</th>
        </tr>
    </thread>
    <tbody>
        <tr *ngFor="let p of data; trackBy: trackByI">
            <td>{{p.id}}</td>
            <td>{{p.name}}</td>
            <td>{{p.surname}}</td>
            <td>{{p.dateOfBirth | date:'fullDate'}}</td>
            <td>{{p | age}}</td>
            <td><a [routerLink]=" p.id + '' "Przejdź</a></td>
        </tr>
    </tbody>
<table>
